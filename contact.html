<body class="bg-[#0f172a] text-slate-300 min-h-screen font-sans overflow-x-hidden relative selection:bg-blue-500/30 selection:text-blue-200 flex flex-col">
    
    <div class="fixed top-0 left-1/4 w-[500px] h-[500px] bg-blue-600/10 rounded-full blur-[150px] pointer-events-none z-0"></div>
    <div class="fixed bottom-0 right-1/4 w-[500px] h-[500px] bg-emerald-600/10 rounded-full blur-[150px] pointer-events-none z-0"></div>

    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 pt-8 pb-12 relative z-10 flex-grow w-full">
        
        <nav class="mb-8 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 text-blue-400 hover:text-blue-300 transition-colors font-semibold text-sm md:text-base">
                <i class="ph ph-arrow-left"></i> Back to Home
            </a>
            <div class="flex items-center gap-2 text-slate-100 font-bold text-xl tracking-tight">
                <i class="ph ph-fingerprint text-blue-500"></i> ZeroKey
            </div>
        </nav>

        <main class="glass-panel p-6 md:p-10 rounded-2xl shadow-2xl border border-slate-700/50 bg-slate-900/60 backdrop-blur-md">
            
            <div class="text-center mb-10">
                <h1 class="text-3xl font-bold text-white mb-3 flex items-center justify-center gap-3 tracking-tight">
                    <i class="ph ph-headset text-blue-400"></i> Contact Support
                </h1>
                <p class="text-slate-400 leading-relaxed text-sm md:text-base">
                    Found a glitch? Have a question about our architecture? Or just want to connect? Send a message below.
                </p>
            </div>

            <div class="mb-8 p-5 bg-slate-950/40 border border-slate-700/50 rounded-xl flex items-center gap-4 hover:border-blue-500/30 transition-colors group cursor-pointer" onclick="window.location.href='mailto:Dippan.connect@gmail.com'">
                <div class="p-3 bg-blue-500/10 rounded-full text-blue-400 group-hover:scale-110 transition-transform">
                    <i class="ph ph-envelope-simple text-2xl"></i>
                </div>
                <div>
                    <h3 class="text-white font-semibold text-sm">Direct Email</h3>
                    <p class="text-slate-400 font-mono text-sm group-hover:text-blue-400 transition-colors">Dippan.connect@gmail.com</p>
                </div>
                <div class="ml-auto text-slate-500 group-hover:text-blue-400 transition-colors">
                    <i class="ph ph-arrow-up-right text-lg"></i>
                </div>
            </div>

            <div class="flex items-center gap-4 mb-8">
                <div class="h-px bg-slate-700/50 flex-grow"></div>
                <span class="text-xs font-semibold text-slate-500 uppercase tracking-widest">Or Use Form</span>
                <div class="h-px bg-slate-700/50 flex-grow"></div>
            </div>

            <form action="https://formspree.io/f/xkoqjqwo" method="POST" enctype="multipart/form-data" class="space-y-6">
                
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-400 mb-2">Your Email</label>
                    <input type="email" id="email" name="email" required placeholder="hacker@example.com" class="w-full bg-slate-950/50 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                </div>

                <div>
                    <label for="message" class="block text-sm font-medium text-slate-400 mb-2">Message</label>
                    <textarea id="message" name="message" rows="5" required placeholder="Describe the glitch, vulnerability, or your inquiry here..." class="w-full bg-slate-950/50 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all resize-none"></textarea>
                </div>

                <div>
                    <label for="upload" class="block text-sm font-medium text-slate-400 mb-2 flex items-center gap-2">
                        Attach Screenshot <span class="text-xs text-slate-500 font-normal">(Optional, Images only)</span>
                    </label>
                    <input type="file" id="upload" name="upload" accept="image/*" class="w-full text-sm text-slate-400 file:mr-4 file:py-3 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-slate-800 file:text-slate-300 hover:file:bg-slate-700 transition-all border border-slate-700 rounded-xl bg-slate-950/50 cursor-pointer">
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold text-lg py-4 rounded-xl transition-all shadow-[0_0_20px_rgba(37,99,235,0.3)] flex items-center justify-center gap-2 group mt-2">
                    <i class="ph ph-paper-plane-right text-xl group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i> Send Message
                </button>
            </form>

        </main>
    </div>

    <footer class="border-t border-slate-800/50 bg-[#0f172a] relative z-10 pt-8 pb-8 mt-auto">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-wrap justify-center gap-6 text-xs font-medium text-slate-500 mb-4">
                <a href="/about" class="hover:text-blue-400 transition-colors">Architecture</a>
                <a href="/privacy" class="hover:text-blue-400 transition-colors">Privacy</a>
                <a href="/terms" class="hover:text-blue-400 transition-colors">Terms</a>
                <a href="/donate" class="hover:text-red-400 transition-colors text-red-500/70">Donate</a>
            </div>
            <div class="text-center text-xs text-slate-700">
                <p>&copy; 2026 ZeroKey. Built by Dippan Bhusal.</p>
            </div>
        </div>
    </footer>
