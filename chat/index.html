<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroChat | Secure Group Rooms</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] } } } }
    </script>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-[#0f172a] text-slate-300 min-h-screen font-sans flex flex-col selection:bg-indigo-500/30">

    <div class="fixed top-0 left-1/2 -translate-x-1/2 w-full h-[500px] bg-indigo-600/10 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <nav class="relative z-50 border-b border-slate-800/50 bg-[#0f172a]/80 backdrop-blur-md sticky top-0">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 text-white font-bold text-xl tracking-tight">
                <i class="ph ph-fingerprint text-indigo-500 text-2xl"></i> ZeroKey <span class="text-slate-500 font-medium">/ Rooms</span>
            </a>
            <div id="authStatus" class="text-xs sm:text-sm font-medium text-slate-400 break-all">Booting v2.0...</div>
        </div>
    </nav>

    <main class="relative z-10 flex-grow max-w-4xl mx-auto w-full flex flex-col p-4 h-[calc(100vh-4rem)]">
        
        <div id="lobbyView" class="flex flex-col items-center justify-center h-full w-full max-w-md mx-auto space-y-6 hidden">
            <div class="text-center mb-4">
                <i class="ph-fill ph-shield-check text-5xl text-indigo-500 mb-2"></i>
                <h1 class="text-2xl font-bold text-white">Secure Rooms</h1>
                <p class="text-slate-400 text-sm mt-1">End-to-End Encrypted Group Chat</p>
            </div>

            <div id="authSection" class="w-full glass-panel p-6 rounded-2xl bg-slate-900/40 border border-slate-800 hidden">
                <h2 class="text-lg font-bold text-white mb-4">Creator Login</h2>
                <input type="email" id="emailInput" placeholder="Email Address" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-white mb-3 focus:border-indigo-500 outline-none">
                <input type="password" id="passwordInput" placeholder="Password" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-white mb-4 focus:border-indigo-500 outline-none">
                <div class="flex gap-2">
                    <button id="loginBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white py-2 rounded-lg font-semibold transition-all">Log In</button>
                    <button id="signupBtn" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-lg font-semibold transition-all">Sign Up</button>
                </div>
            </div>

            <div id="createRoomSection" class="w-full glass-panel p-6 rounded-2xl bg-slate-900/40 border border-slate-800 hidden">
                <h2 class="text-lg font-bold text-white mb-4">Create New Room</h2>
                <input type="text" id="newRoomName" placeholder="Room Name (e.g. Project Alpha)" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-white mb-3 focus:border-indigo-500 outline-none">
                <input type="text" id="newRoomPassword" placeholder="Room Password (Optional)" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-white mb-3 focus:border-indigo-500 outline-none">
                <select id="retentionSelect" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-white mb-4 focus:border-indigo-500 outline-none">
                    <option value="24">Self-Destruct in 24 Hours</option>
                    <option value="48">Self-Destruct in 48 Hours</option>
                </select>
                <button id="createRoomBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-lg font-semibold transition-all flex items-center justify-center gap-2">
                    <i class="ph ph-plus-circle text-lg"></i> Deploy Room
                </button>
            </div>

            <div id="joinRoomSection" class="w-full glass-panel p-6 rounded-2xl bg-slate-900/40 border border-indigo-500/30 hidden">
                <h2 class="text-lg font-bold text-white mb-2">Join Room</h2>
                <p id="joinRoomName" class="text-sm text-indigo-400 font-mono mb-4">Fetching details...</p>
                <input type="text" id="guestNameInput" placeholder="Enter a temporary display name" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-white mb-3 focus:border-indigo-500 outline-none">
                <input type="password" id="joinPasswordInput" placeholder="Room Password" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-white mb-4 focus:border-indigo-500 outline-none hidden">
                <button id="joinRoomBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-2 rounded-lg font-semibold transition-all flex items-center justify-center gap-2">
                    <i class="ph ph-sign-in text-lg"></i> Enter Vault
                </button>
            </div>
        </div>

        <div id="chatView" class="flex-grow flex flex-col h-full hidden">
            <div class="glass-panel p-4 rounded-2xl bg-slate-900/40 border border-slate-800 mb-4 flex justify-between items-center relative">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-indigo-500/20 flex items-center justify-center text-indigo-400"><i class="ph-fill ph-users text-xl"></i></div>
                    <div>
                        <h2 id="chatRoomTitle" class="text-white font-bold leading-tight">Room Name</h2>
                        <p class="text-xs text-emerald-400 font-mono flex items-center gap-1"><i class="ph-fill ph-lock-key"></i> E2EE Active</p>
                    </div>
                </div>
                <button id="inviteBtn" class="bg-slate-800 hover:bg-slate-700 text-white text-xs font-semibold px-3 py-2 rounded-lg transition-all border border-slate-700 flex items-center gap-2">
                    <i class="ph ph-user-plus"></i> Invite
                </button>
                
                <div id="inviteModal" class="hidden absolute top-16 right-0 z-50 glass-panel p-4 rounded-xl border border-indigo-500/50 bg-slate-900 shadow-2xl w-80">
                    <p class="text-xs text-slate-400 mb-1">Share this link to invite guests:</p>
                    <input type="text" id="shareUrl" readonly class="w-full bg-slate-800 border border-slate-700 rounded py-1 px-2 text-xs font-mono text-white mb-2">
                    <p id="sharePwdDisplay" class="text-xs text-red-400 font-mono mb-3 hidden">Password: <span></span></p>
                    <button id="copyShareBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-1.5 rounded text-xs font-bold transition-all">Copy Link</button>
                </div>
            </div>

            <div id="messagesContainer" class="flex-grow overflow-y-auto space-y-4 mb-2 pr-2 custom-scrollbar"></div>

            <div id="typingIndicator" class="hidden text-xs text-indigo-400 font-mono mb-2 px-2 animate-pulse flex items-center gap-2">
                <i class="ph ph-chat-teardrop-dots text-lg"></i> Someone is typing...
            </div>

            <form id="chatForm" class="relative mt-auto border-t border-slate-800 pt-4">
                <input type="text" id="messageInput" autocomplete="off" placeholder="Type a secure message..." class="w-full bg-slate-900/80 border border-slate-700 rounded-xl py-4 pl-4 pr-16 text-white placeholder:text-slate-500 focus:outline-none focus:border-indigo-500 transition-all">
                <button type="submit" id="sendBtn" class="absolute right-2 top-1/2 -translate-y-1/2 mt-2 w-10 h-10 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg flex items-center justify-center transition-all shadow-[0_0_10px_rgba(79,70,229,0.4)]">
                    <i class="ph-fill ph-paper-plane-right text-lg"></i>
                </button>
            </form>
        </div>
    </main>

    <script>
        // GLOBAL ERROR CATCHER - Prints crashes directly to the UI
        window.onerror = function(message, source, lineno, colno, error) {
            const status = document.getElementById('authStatus');
            if(status) status.innerHTML = `<span class="text-red-500 font-bold">CRASH: ${message} (Line ${lineno})</span>`;
            return true;
        };

        // Wait for HTML to load before running ANY javascript
        document.addEventListener("DOMContentLoaded", function() {
            
            const lobbyView = document.getElementById('lobbyView');
            const chatView = document.getElementById('chatView');
            const authSection = document.getElementById('authSection');
            const createRoomSection = document.getElementById('createRoomSection');
            const joinRoomSection = document.getElementById('joinRoomSection');
            const authStatus = document.getElementById('authStatus');

            // Fallback for random UUID if mobile browser rejects it
            let myClientId = (window.crypto && window.crypto.randomUUID) 
                ? window.crypto.randomUUID() 
                : 'user-' + Math.random().toString(36).substring(2, 15);

            let supabase;
            let currentUser = null;
            let currentRoomId = null;
            let masterAesKey = null;
            let myDisplayName = "Creator";
            let roomChannel;
            let amITyping = false;
            let typingTimeout = null;

            function bufferToBase64(buf) { return window.btoa(String.fromCharCode(...new Uint8Array(buf))); }
            function base64ToBuffer(b64) { return new Uint8Array([...window.atob(b64)].map(c => c.charCodeAt(0))).buffer; }

            async function deriveKeyFromPassword(password, salt) {
                const enc = new TextEncoder();
                const keyMaterial = await window.crypto.subtle.importKey("raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]);
                return await window.crypto.subtle.deriveKey(
                    { name: "PBKDF2", salt: enc.encode(salt), iterations: 100000, hash: "SHA-256" },
                    keyMaterial, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]
                );
            }

            async function generateRandomKey() {
                return await window.crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
            }

            async function encryptData(text) {
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const cipher = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv }, masterAesKey, new TextEncoder().encode(text));
                return { ciphertext: bufferToBase64(cipher), iv: bufferToBase64(iv) };
            }

            async function decryptData(ciphertextB64, ivB64) {
                try {
                    const plain = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: base64ToBuffer(ivB64) }, masterAesKey, base64ToBuffer(ciphertextB64));
                    return new TextDecoder().decode(plain);
                } catch (e) { return "⚠️ [Decryption Failed]"; }
            }

            async function initApp() {
                try {
                    authStatus.innerText = "Fetching Config...";
                    const configRes = await fetch('/api/getConfig');
                    if (!configRes.ok) throw new Error("Could not load API Config");
                    const config = await configRes.json();

                    authStatus.innerText = "Connecting DB...";
                    supabase = window.supabase.createClient(config.url, config.anonKey);

                    authStatus.innerText = "Checking Auth...";
                    const { data: { session }, error: authErr } = await supabase.auth.getSession();
                    if (authErr) throw authErr;
                    
                    currentUser = session?.user || null;
                    authStatus.innerText = currentUser ? `Logged in: ${currentUser.email}` : 'Guest Mode';

                    const hash = window.location.hash.substring(1);
                    lobbyView.classList.remove('hidden');

                    if (hash) {
                        const parts = hash.split('|');
                        currentRoomId = parts[0];
                        const isUrlKey = parts.length > 1;

                        const { data: roomData, error: dbErr } = await supabase.from('chat_rooms').select('room_name, is_protected').eq('id', currentRoomId).single();
                        if (dbErr || !roomData) throw new Error("Room not found or expired.");

                        document.getElementById('joinRoomName').innerText = `Room: ${roomData.room_name}`;
                        if (roomData.is_protected && !isUrlKey) document.getElementById('joinPasswordInput').classList.remove('hidden');
                        
                        authSection.classList.add('hidden');
                        createRoomSection.classList.add('hidden');
                        joinRoomSection.classList.remove('hidden');
                    } else {
                        if (currentUser) {
                            authSection.classList.add('hidden');
                            createRoomSection.classList.remove('hidden');
                        } else {
                            authSection.classList.remove('hidden');
                            createRoomSection.classList.add('hidden');
                        }
                    }
                } catch (err) {
                    console.error("Boot Error:", err);
                    authStatus.innerHTML = `<span class="text-red-400 font-bold"><i class="ph ph-warning"></i> ${err.message}</span>`;
                }
            }

            // --- ALL EVENT LISTENERS ---
            document.getElementById('signupBtn').onclick = async () => {
                const eInput = document.getElementById('emailInput').value;
                const pInput = document.getElementById('passwordInput').value;
                if(!eInput || !pInput) return alert("Enter email and password");
                document.getElementById('signupBtn').innerText = "Working...";
                const { error } = await supabase.auth.signUp({ email: eInput, password: pInput });
                if (error) { alert(error.message); document.getElementById('signupBtn').innerText = "Sign Up"; } 
                else { alert("Success! You can now log in."); location.reload(); }
            };
            
            document.getElementById('loginBtn').onclick = async () => {
                const eInput = document.getElementById('emailInput').value;
                const pInput = document.getElementById('passwordInput').value;
                if(!eInput || !pInput) return alert("Enter email and password");
                document.getElementById('loginBtn').innerText = "Working...";
                const { error } = await supabase.auth.signInWithPassword({ email: eInput, password: pInput });
                if (error) { alert(error.message); document.getElementById('loginBtn').innerText = "Log In"; } 
                else location.reload();
            };

            document.getElementById('createRoomBtn').onclick = async () => {
                const name = document.getElementById('newRoomName').value || "Secure Vault";
                const pwd = document.getElementById('newRoomPassword').value;
                const hours = parseInt(document.getElementById('retentionSelect').value);
                
                document.getElementById('createRoomBtn').innerHTML = `<i class="ph ph-spinner animate-spin"></i> Deploying...`;

                const { data, error } = await supabase.from('chat_rooms').insert([{
                    room_name: name, is_protected: !!pwd, retention_hours: hours,
                    expires_at: new Date(Date.now() + hours * 3600000).toISOString(), creator_id: currentUser.id
                }]).select().single();

                if (error) return alert("Error creating room: " + error.message);

                let urlHash = `#${data.id}`;
                if (pwd) {
                    masterAesKey = await deriveKeyFromPassword(pwd, data.id);
                } else {
                    masterAesKey = await generateRandomKey();
                    const exported = await window.crypto.subtle.exportKey("raw", masterAesKey);
                    urlHash += `|${bufferToBase64(exported)}`;
                }

                window.history.replaceState(null, null, urlHash);
                myDisplayName = "Creator";
                currentRoomId = data.id;
                enterChat(name, pwd);
            };

            document.getElementById('joinRoomBtn').onclick = async () => {
                myDisplayName = document.getElementById('guestNameInput').value || "Guest_" + Math.floor(Math.random()*1000);
                const pwd = document.getElementById('joinPasswordInput').value;
                const parts = window.location.hash.substring(1).split('|');

                document.getElementById('joinRoomBtn').innerHTML = `<i class="ph ph-spinner animate-spin"></i> Decrypting...`;

                try {
                    if (parts.length > 1) {
                        masterAesKey = await window.crypto.subtle.importKey("raw", base64ToBuffer(parts[1]), { name: "AES-GCM" }, true, ["encrypt", "decrypt"]);
                    } else {
                        if (!pwd) throw new Error("Password required");
                        masterAesKey = await deriveKeyFromPassword(pwd, currentRoomId);
                    }
                    const { data: roomData } = await supabase.from('chat_rooms').select('room_name').eq('id', currentRoomId).single();
                    enterChat(roomData.room_name);
                } catch (e) {
                    alert("Invalid Password or corrupted link.");
                    document.getElementById('joinRoomBtn').innerHTML = `<i class="ph ph-sign-in text-lg"></i> Enter Vault`;
                }
            };

            async function enterChat(roomName, rawPwd = null) {
                lobbyView.classList.add('hidden');
                chatView.classList.remove('hidden');
                document.getElementById('chatRoomTitle').innerText = roomName;

                document.getElementById('shareUrl').value = window.location.href;
                if (rawPwd) {
                    document.getElementById('sharePwdDisplay').classList.remove('hidden');
                    document.getElementById('sharePwdDisplay').querySelector('span').innerText = rawPwd;
                }

                const { data: history } = await supabase.from('chat_messages').select('*').eq('room_id', currentRoomId).order('created_at', { ascending: true });
                if (history) {
                    for (const msg of history) {
                        const plain = await decryptData(msg.ciphertext, msg.iv);
                        renderMessage(plain, msg.sender_name, msg.sender_name === myDisplayName);
                    }
                }

                supabase.channel('public:chat_messages')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages', filter: `room_id=eq.${currentRoomId}` }, async (payload) => {
                        if (payload.new.sender_name === myDisplayName) return; 
                        document.getElementById('typingIndicator').classList.add('hidden');
                        const plain = await decryptData(payload.new.ciphertext, payload.new.iv);
                        renderMessage(plain, payload.new.sender_name, false);
                    }).subscribe();

                roomChannel = supabase.channel(`typing:${currentRoomId}`);
                roomChannel.on('broadcast', { event: 'typing' }, (p) => {
                    if (p.payload.sender === myDisplayName) return;
                    document.getElementById('typingIndicator').classList.toggle('hidden', !p.payload.isTyping);
                }).subscribe();
            }

            document.getElementById('chatForm').onsubmit = async (e) => {
                e.preventDefault();
                const text = document.getElementById('messageInput').value.trim();
                if (!text || !masterAesKey) return;
                document.getElementById('messageInput').value = '';
                renderMessage(text, myDisplayName, true);
                roomChannel.send({ type: 'broadcast', event: 'typing', payload: { sender: myDisplayName, isTyping: false } });
                const { ciphertext, iv } = await encryptData(text);
                await supabase.from('chat_messages').insert([{ room_id: currentRoomId, sender_name: myDisplayName, ciphertext, iv }]);
            };

            document.getElementById('messageInput').oninput = () => {
                if (!amITyping) { amITyping = true; roomChannel.send({ type: 'broadcast', event: 'typing', payload: { sender: myDisplayName, isTyping: true } }); }
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => { amITyping = false; roomChannel.send({ type: 'broadcast', event: 'typing', payload: { sender: myDisplayName, isTyping: false } }); }, 1500);
            };

            document.getElementById('inviteBtn').onclick = () => document.getElementById('inviteModal').classList.toggle('hidden');
            document.getElementById('copyShareBtn').onclick = () => { navigator.clipboard.writeText(document.getElementById('shareUrl').value); document.getElementById('copyShareBtn').innerText = "Copied!"; };

            function renderMessage(text, sender, isMe) {
                const c = document.getElementById('messagesContainer');
                const div = document.createElement('div');
                div.className = `flex flex-col w-full ${isMe ? 'items-end' : 'items-start'}`;
                div.innerHTML = `
                    <span class="text-[10px] text-slate-500 mb-1 px-1">${sender}</span>
                    <div class="max-w-[75%] p-3 rounded-2xl text-sm font-mono break-words ${isMe ? 'bg-indigo-600 text-white rounded-tr-sm' : 'bg-slate-800 text-emerald-300 border border-slate-700 rounded-tl-sm'}">
                        ${text}
                    </div>`;
                c.appendChild(div);
                c.scrollTop = c.scrollHeight;
            }

            // Kick off the boot sequence
            initApp();
        });
    </script>
</body>
</html>
