<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroChat | Secure Group Rooms</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] } } } }
    </script>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-[#0f172a] text-slate-300 min-h-screen font-sans flex flex-col selection:bg-indigo-500/30">

    <div class="fixed top-0 left-1/2 -translate-x-1/2 w-full h-[500px] bg-indigo-600/10 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <nav class="relative z-50 border-b border-slate-800/50 bg-[#0f172a]/80 backdrop-blur-md sticky top-0">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/chat" class="flex items-center gap-2 text-white font-bold text-xl tracking-tight cursor-pointer">
                <i class="ph ph-fingerprint text-indigo-500 text-2xl"></i> ZeroKey <span class="text-slate-500 font-medium">/ Rooms</span>
            </a>
            
            <div id="userNavMenu" class="hidden flex items-center gap-3">
                <button id="navDashboardBtn" class="text-sm font-semibold text-slate-300 hover:text-white transition-colors">Dashboard</button>
                <div id="navProfileBtn" class="w-8 h-8 rounded-full bg-slate-700 overflow-hidden border border-slate-600 cursor-pointer hover:border-indigo-400 transition-all">
                    <img id="navAvatarImg" src="" class="w-full h-full object-cover hidden" alt="Profile">
                    <i id="navAvatarIcon" class="ph-fill ph-user text-slate-400 text-lg w-full h-full flex items-center justify-center"></i>
                </div>
            </div>
            <div id="authStatus" class="text-xs sm:text-sm font-medium text-slate-400">Booting v3.0...</div>
        </div>
    </nav>

    <main class="relative z-10 flex-grow max-w-4xl mx-auto w-full flex flex-col p-4 h-[calc(100vh-4rem)]">
        
        <div id="lobbyView" class="flex flex-col items-center justify-center h-full w-full max-w-md mx-auto space-y-6 hidden">
            
            <div id="authSection" class="w-full glass-panel p-6 rounded-2xl bg-slate-900/40 border border-slate-800 hidden">
                <h2 class="text-lg font-bold text-white mb-4 text-center">Creator Login</h2>
                <input type="email" id="emailInput" placeholder="Email Address" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-white mb-3 focus:border-indigo-500 outline-none">
                <input type="password" id="passwordInput" placeholder="Password" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-white mb-4 focus:border-indigo-500 outline-none">
                <div class="flex gap-2">
                    <button id="loginBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white py-2 rounded-lg font-semibold transition-all">Log In</button>
                    <button id="signupBtn" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-lg font-semibold transition-all">Sign Up</button>
                </div>
            </div>

            <div id="createRoomSection" class="w-full glass-panel p-6 rounded-2xl bg-slate-900/40 border border-slate-800 hidden">
                <h2 class="text-lg font-bold text-white mb-4">Create New Room</h2>
                <input type="text" id="newRoomName" placeholder="Room Name (e.g. Project Alpha)" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-white mb-3 focus:border-indigo-500 outline-none">
                <div class="flex items-center gap-2 mb-3">
                    <span class="text-slate-500 text-sm">zerokey.vercel.app/chat#</span>
                    <input type="text" id="newRoomAlias" placeholder="custom-name (optional)" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-white focus:border-indigo-500 outline-none">
                </div>
                <input type="password" id="newRoomPassword" placeholder="Room Password (Optional)" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-white mb-3 focus:border-indigo-500 outline-none">
                <select id="retentionSelect" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-white mb-4 focus:border-indigo-500 outline-none">
                    <option value="24">Self-Destruct in 24 Hours</option>
                    <option value="48">Self-Destruct in 48 Hours</option>
                </select>
                <button id="createRoomBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-lg font-semibold transition-all flex items-center justify-center gap-2">
                    <i class="ph ph-plus-circle text-lg"></i> Deploy Room
                </button>
            </div>

            <div id="joinRoomSection" class="w-full glass-panel p-6 rounded-2xl bg-slate-900/40 border border-indigo-500/30 hidden">
                <h2 class="text-lg font-bold text-white mb-2">Join Room</h2>
                <p id="joinRoomName" class="text-sm text-indigo-400 font-mono mb-4">Fetching details...</p>
                <input type="text" id="guestNameInput" placeholder="Enter a temporary display name" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-white mb-3 focus:border-indigo-500 outline-none">
                <input type="password" id="joinPasswordInput" placeholder="Room Password" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-white mb-4 focus:border-indigo-500 outline-none hidden">
                <button id="joinRoomBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-2 rounded-lg font-semibold transition-all flex items-center justify-center gap-2">
                    <i class="ph ph-sign-in text-lg"></i> Enter Vault
                </button>
            </div>
        </div>

        <div id="dashboardView" class="w-full max-w-2xl mx-auto hidden flex-col h-full">
            <h1 class="text-2xl font-bold text-white mb-6 flex items-center gap-2"><i class="ph-fill ph-circles-four text-indigo-500"></i> My Active Rooms</h1>
            <div id="dashboardRoomsList" class="space-y-3 overflow-y-auto custom-scrollbar flex-grow">
                </div>
        </div>

        <div id="settingsView" class="w-full max-w-md mx-auto hidden flex-col">
            <div class="glass-panel p-6 rounded-2xl bg-slate-900/40 border border-slate-800 flex flex-col items-center">
                <h2 class="text-xl font-bold text-white mb-6">Profile Settings</h2>
                
                <div class="relative w-24 h-24 rounded-full bg-slate-800 border-2 border-slate-700 mb-6 group overflow-hidden">
                    <img id="settingsAvatarImg" src="" class="w-full h-full object-cover hidden">
                    <i id="settingsAvatarIcon" class="ph-fill ph-user text-slate-500 text-4xl w-full h-full flex items-center justify-center"></i>
                    <label class="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
                        <i class="ph ph-camera text-white text-2xl"></i>
                        <input type="file" id="avatarUploadInput" accept="image/*" class="hidden">
                    </label>
                </div>

                <div class="w-full space-y-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Display Name</label>
                        <input type="text" id="settingsNameInput" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-white focus:border-indigo-500 outline-none">
                    </div>
                    <button id="saveProfileBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-2 rounded-lg font-semibold transition-all">Save Changes</button>
                    <button id="logoutBtn" class="w-full bg-red-500/10 text-red-400 hover:bg-red-500/20 py-2 rounded-lg font-semibold transition-all mt-4">Log Out</button>
                </div>
            </div>
        </div>

        <div id="chatView" class="flex-grow flex flex-col h-full hidden">
            <div class="glass-panel p-4 rounded-2xl bg-slate-900/40 border border-slate-800 mb-4 flex justify-between items-center relative">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-indigo-500/20 flex items-center justify-center text-indigo-400"><i class="ph-fill ph-users text-xl"></i></div>
                    <div>
                        <h2 id="chatRoomTitle" class="text-white font-bold leading-tight">Room Name</h2>
                        <p class="text-xs text-emerald-400 font-mono flex items-center gap-1"><i class="ph-fill ph-lock-key"></i> E2EE Active</p>
                    </div>
                </div>
                <button id="inviteBtn" class="bg-slate-800 hover:bg-slate-700 text-white text-xs font-semibold px-3 py-2 rounded-lg transition-all border border-slate-700 flex items-center gap-2">
                    <i class="ph ph-user-plus"></i> Invite
                </button>
                
                <div id="inviteModal" class="hidden absolute top-16 right-0 z-50 glass-panel p-4 rounded-xl border border-indigo-500/50 bg-slate-900 shadow-2xl w-80">
                    <p class="text-xs text-slate-400 mb-1">Share this link to invite guests:</p>
                    <input type="text" id="shareUrl" readonly class="w-full bg-slate-800 border border-slate-700 rounded py-1 px-2 text-xs font-mono text-white mb-2">
                    <p id="sharePwdDisplay" class="text-xs text-red-400 font-mono mb-3 hidden">Password: <span></span></p>
                    <button id="copyShareBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-1.5 rounded text-xs font-bold transition-all">Copy Link</button>
                </div>
            </div>

            <div id="messagesContainer" class="flex-grow overflow-y-auto space-y-4 mb-2 pr-2 custom-scrollbar"></div>

            <div id="typingIndicator" class="hidden text-xs text-indigo-400 font-mono mb-2 px-2 animate-pulse flex items-center gap-2">
                <i class="ph ph-chat-teardrop-dots text-lg"></i> Someone is typing...
            </div>

            <form id="chatForm" class="relative mt-auto border-t border-slate-800 pt-4 flex gap-2">
                <div class="relative flex-grow">
                    <input type="text" id="messageInput" autocomplete="off" placeholder="Type a secure message..." class="w-full bg-slate-900/80 border border-slate-700 rounded-xl py-4 pl-12 pr-4 text-white placeholder:text-slate-500 focus:outline-none focus:border-indigo-500 transition-all">
                    
                    <label class="absolute left-2 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center cursor-pointer text-slate-400 hover:text-indigo-400 transition-colors">
                        <i class="ph ph-paperclip text-xl"></i>
                        <input type="file" id="chatFileInput" class="hidden">
                    </label>
                </div>
                
                <button type="submit" id="sendBtn" class="w-14 h-[58px] bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl flex items-center justify-center transition-all shadow-[0_0_10px_rgba(79,70,229,0.4)] flex-shrink-0">
                    <i class="ph-fill ph-paper-plane-right text-xl"></i>
                </button>
            </form>
            <div id="filePreviewContainer" class="hidden mt-2 p-2 bg-slate-800 rounded-lg flex items-center justify-between border border-slate-700">
                <div class="flex items-center gap-2 text-sm text-slate-300">
                    <i class="ph ph-file-text text-indigo-400 text-xl"></i>
                    <span id="filePreviewName" class="truncate max-w-[200px]">filename.png</span>
                </div>
                <button type="button" id="removeFileBtn" class="text-red-400 hover:text-red-300"><i class="ph ph-x-circle text-lg"></i></button>
            </div>
        </div>
    </main>

    <script src="/chat/app.js"></script>
</body>
</html>
