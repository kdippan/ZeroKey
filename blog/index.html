<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SLS94VX99N"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-SLS94VX99N');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Blog | ZeroKey - Zero-Knowledge Security Insights</title>
    <meta name="description" content="Deep dives into cryptography, browser security, and privacy-first engineering by Dippan Bhusal.">
    
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon-180x180.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(51, 65, 85, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            border-color: rgba(99, 102, 241, 0.5);
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        .search-input:focus {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 min-h-screen font-sans selection:bg-indigo-500/30">

    <div class="fixed top-0 left-1/2 -translate-x-1/2 w-full h-[500px] bg-indigo-600/10 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <nav class="relative z-10 border-b border-slate-800/50 bg-[#020617]/80 backdrop-blur-md sticky top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 text-white font-bold text-xl tracking-tight">
                <i class="ph ph-fingerprint text-indigo-500"></i> ZeroKey <span class="text-slate-500 font-medium">/ Blog</span>
            </a>
            <div class="flex gap-4">
                <a href="https://github.com/kdippan" target="_blank" class="text-slate-400 hover:text-white transition-colors text-xl">
                    <i class="ph ph-github-logo"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        
        <header class="max-w-3xl mb-16">
            <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-4 tracking-tight">Engineering Hub</h1>
            <p class="text-lg text-slate-400">Deep dives into zero-knowledge architecture, client-side cryptography, and building secure systems in a hostile web.</p>
        </header>

        <div class="relative max-w-2xl mb-12">
            <i class="ph ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl"></i>
            <input type="text" id="blogSearch" placeholder="Search topics (e.g. 'WebRTC', 'Encryption', 'XSS')..." 
                   class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl py-4 pl-12 pr-4 text-white placeholder:text-slate-600 focus:outline-none focus:border-indigo-500 search-input transition-all">
        </div>

        <div id="blogGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

        <div id="noResults" class="hidden py-20 text-center">
            <i class="ph ph-detective text-5xl text-slate-700 mb-4"></i>
            <p class="text-slate-500">No articles match your search query.</p>
        </div>
    </main>

    <footer class="relative z-10 border-t border-slate-900 py-12 mt-20">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-sm text-slate-600">&copy; 2026 ZeroKey Engineering. Authored by <a href="https://github.com/kdippan" class="text-indigo-400">Dippan Bhusal</a>.</p>
        </div>
    </footer>

    <script>
        const blogs = [
            { title: "Securely Sharing ENV Files", desc: "Why sharing .env files over Slack is a risk and how to build a zero-knowledge alternative.", url: "/blog/how-to-securely-share-env-files", tags: ["Security", "DevOps"], icon: "ph-shield-check" },
            { title: "The URL Fragment Exploit", desc: "Understanding the 'Hash' in URLs and how it enables zero-knowledge data sharing.", url: "/blog/the-url-fragment-exploit-zero-knowledge", tags: ["Cryptography", "Web"], icon: "ph-link" },
            { title: "Bypassing Vercel Payload Limits", desc: "How to handle large file uploads on serverless platforms using direct S3/Supabase uploads.", url: "/blog/how-to-bypass-vercel-payload-limit", tags: ["Vercel", "Performance"], icon: "ph-cloud-arrow-up" },
            { title: "Why XSS Defeats Encryption", desc: "Why even the best AES-256 implementation is useless if your site is vulnerable to script injection.", url: "/blog/why-xss-defeats-client-side-encryption", tags: ["Security", "XSS"], icon: "ph-bug" },
            { title: "Web Workers & UI Freezing", desc: "Offload heavy Web Crypto operations to background threads for 60fps performance.", url: "/blog/how-to-prevent-ui-freezing-with-web-workers", tags: ["JavaScript", "Performance"], icon: "ph-cpu" },
            { title: "Clipboard Hijacking Prevention", desc: "Stop attackers from swapping crypto addresses using the modern Clipboard API.", url: "/blog/how-to-prevent-clipboard-hijacking-javascript", tags: ["Security", "API"], icon: "ph-copy" },
            { title: "P2P Sharing with WebRTC", desc: "Building a serverless file sharing tool that works directly between browsers.", url: "/blog/how-to-build-p2p-file-sharing-webrtc", tags: ["WebRTC", "Networking"], icon: "ph-users-three" },
            { title: "Key Derivation with PBKDF2", desc: "How to turn a weak user password into a cryptographically strong 256-bit key.", url: "/blog/how-to-derive-encryption-keys-pbkdf2", tags: ["Cryptography", "Auth"], icon: "ph-key" },
            { title: "Geofencing in JavaScript", desc: "Restricting data access based on physical location using the Geolocation API.", url: "/blog/how-to-build-geofencing-javascript", tags: ["Geolocation", "Privacy"], icon: "ph-map-pin" },
            { title: "Burn After Reading with Supabase", desc: "Implementing self-destructing data using Supabase edge functions and TTL.", url: "/blog/how-to-build-burn-after-reading-supabase", tags: ["Database", "Privacy"], icon: "ph-fire" },
            { title: "WebAuthn & Biometrics", desc: "Replacing passwords with FaceID and TouchID using the WebAuthn standard.", url: "/blog/how-to-implement-webauthn-biometrics", tags: ["Security", "Auth"], icon: "ph-fingerprint" },
            { title: "Don't Use Math.random()", desc: "Why standard random numbers are predictable and how to use crypto.getRandomValues().", url: "/blog/why-never-use-math-random-for-cryptography", tags: ["Cryptography", "JavaScript"], icon: "ph-dice-five" },
            { title: "Abandoning NPM for Crypto", desc: "The supply-chain risks of third-party libraries and why we chose native Web Crypto.", url: "/blog/why-abandoned-npm-for-cryptography", tags: ["Security", "Engineering"], icon: "ph-package" },
            { title: "LocalStorage Security Risks", desc: "Why you should never store unencrypted keys in LocalStorage or Cookies.", url: "/blog/why-never-store-keys-in-localstorage", tags: ["Security", "Web"], icon: "ph-database" },
            { title: "ArrayBuffer to Base64", desc: "Efficiently handling binary data for transport over JSON APIs.", url: "/blog/how-to-convert-arraybuffer-to-base64", tags: ["JavaScript", "Data"], icon: "ph-code" },
            { title: "Secure Downloads in JS", desc: "How to trigger a browser download for decrypted binary Blobs safely.", url: "/blog/how-to-trigger-secure-downloads-in-javascript", tags: ["Web", "Data"], icon: "ph-download-simple" },
            { title: "Encrypting Large Files", desc: "Using Streams API to encrypt multi-gigabyte files without crashing the browser RAM.", url: "/blog/how-to-encrypt-large-files-javascript-streams", tags: ["Performance", "Data"], icon: "ph-waves" },
            { title: "Sharing API Keys Securely", desc: "Best practices for ephemeral API key distribution in development teams.", url: "/blog/how-to-share-api-keys-securely", tags: ["Security", "Team"], icon: "ph-identification-badge" }
        ];

        const blogGrid = document.getElementById('blogGrid');
        const searchInput = document.getElementById('blogSearch');
        const noResults = document.getElementById('noResults');

        function renderBlogs(filter = '') {
            const filtered = blogs.filter(b => 
                b.title.toLowerCase().includes(filter.toLowerCase()) || 
                b.desc.toLowerCase().includes(filter.toLowerCase()) ||
                b.tags.some(t => t.toLowerCase().includes(filter.toLowerCase()))
            );

            blogGrid.innerHTML = filtered.map(blog => `
                <a href="${blog.url}" class="glass-card p-6 rounded-2xl flex flex-col group">
                    <div class="mb-4 flex justify-between items-start">
                        <div class="w-12 h-12 rounded-xl bg-indigo-500/10 flex items-center justify-center text-indigo-400 text-2xl group-hover:bg-indigo-500 group-hover:text-white transition-all">
                            <i class="ph ${blog.icon}"></i>
                        </div>
                        <div class="flex gap-2">
                            ${blog.tags.map(t => `<span class="text-[10px] font-bold uppercase tracking-wider bg-slate-800 text-slate-400 px-2 py-1 rounded-md">${t}</span>`).join('')}
                        </div>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-2 group-hover:text-indigo-400 transition-colors">${blog.title}</h3>
                    <p class="text-slate-400 text-sm leading-relaxed mb-6 flex-grow">${blog.desc}</p>
                    <div class="flex items-center text-indigo-400 text-sm font-semibold gap-1">
                        Read Analysis <i class="ph ph-arrow-right"></i>
                    </div>
                </a>
            `).join('');

            noResults.classList.toggle('hidden', filtered.length > 0);
        }

        searchInput.addEventListener('input', (e) => renderBlogs(e.target.value));
        
        // Initial render
        renderBlogs();
    </script>
</body>
</html>
