<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroKey | Secure Client-Side Share</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f172a] text-white min-h-screen flex items-center justify-center font-sans p-4">

    <div class="glass-panel p-8 rounded-2xl shadow-2xl w-full max-w-lg border border-slate-700 relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500 rounded-full blur-[80px] opacity-20"></div>

        <h1 class="text-3xl font-bold mb-2 flex items-center gap-3">
            <i class="ph ph-fingerprint text-blue-500 text-4xl"></i> ZeroKey
        </h1>
        <p class="text-slate-400 mb-6 text-sm">End-to-end encrypted. The server never sees your key.</p>

        <textarea id="secretInput" rows="6" 
            class="w-full bg-slate-900/50 text-slate-100 border border-slate-600 rounded-xl p-4 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all resize-none placeholder-slate-500" 
            placeholder="Type your sensitive payload here..."></textarea>

        <button id="encryptBtn" 
            class="w-full mt-5 bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-4 rounded-xl transition-all flex justify-center items-center gap-2 shadow-[0_0_15px_rgba(37,99,235,0.4)] hover:shadow-[0_0_25px_rgba(37,99,235,0.6)]">
            <i class="ph ph-lock-key text-xl"></i> Encrypt & Generate Link
        </button>

        <div id="resultContainer" class="hidden mt-6 p-4 bg-slate-900/80 rounded-xl border border-emerald-500/50 relative">
            <p class="text-xs text-emerald-400 mb-2 font-semibold flex items-center gap-1">
                <i class="ph ph-check-circle"></i> Secure Link Generated
            </p>
            <input type="text" id="linkOutput" readonly 
                class="w-full bg-transparent text-slate-200 outline-none text-sm cursor-text font-mono break-all pr-10">
            <button id="copyBtn" class="absolute bottom-3 right-3 p-2 bg-slate-800 rounded-lg hover:bg-slate-700 text-slate-300 transition-colors">
                <i class="ph ph-copy text-lg"></i>
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
