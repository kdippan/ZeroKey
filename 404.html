<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Vault Not Found | ZeroKey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
</head>
<body class="bg-[#0f172a] text-slate-300 min-h-screen flex items-center justify-center font-sans p-4 overflow-hidden relative">
    
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-red-600/10 rounded-full blur-[120px] pointer-events-none z-0"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-blue-600/10 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <div class="glass-panel p-8 md:p-12 rounded-2xl shadow-2xl w-full max-w-lg border border-red-500/30 bg-slate-900/80 backdrop-blur-md text-center relative z-10">
        
        <div class="inline-block p-4 bg-red-500/10 rounded-full mb-6 border border-red-500/20 shadow-[0_0_20px_rgba(239,68,68,0.15)]">
            <i class="ph ph-warning-octagon text-red-500 text-6xl"></i>
        </div>
        
        <h1 class="text-4xl font-bold text-white mb-2 tracking-tight">Error 404</h1>
        <h2 class="text-xl font-semibold text-red-400 mb-6 tracking-wide uppercase">Vault Not Found</h2>
        
        <p class="text-slate-400 mb-8 leading-relaxed">
            The encrypted payload or page you are looking for has either self-destructed, never existed, or you lack the required clearance to view it.
        </p>

        <a href="/" class="inline-flex items-center justify-center gap-2 w-full bg-slate-800 hover:bg-slate-700 text-white font-semibold py-4 px-6 rounded-xl transition-all border border-slate-600 shadow-inner group">
            <i class="ph ph-arrow-left text-xl text-blue-400 group-hover:-translate-x-1 transition-transform"></i> 
            Return to Secure Origin
        </a>

    </div>
</body>
</html>
